<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cat Dashboard</title>

    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet"
    />

    <style>
        :root {
            --green: #22c55e;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;

            background: #000;
            color: var(--white);

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            font-family: "JetBrains Mono", monospace;
        }

        #frame {
            width: min(900px, 95vw);
        }

        #cat {
            display: block;
            width: 100%;
            height: auto;
            max-height: 65vh;
            object-fit: contain;
        }

        /* Shared box styling */
        .box {
            margin-top: 18px;

            width: 420px;
            max-width: 90vw;

            padding: 12px 20px;

            border: 1px solid var(--green);
            border-radius: 12px;

            background: #0a0a0a;

            font-size: 20px;
            text-align: center;
        }

        #apod-link {
            color: var(--white);
            text-decoration: none;

            transition:
                background 0.2s ease,
                transform 0.2s ease;
        }

        #apod-link:hover {
            background: rgba(34, 197, 94, 0.12);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div id="frame">
        <img
            id="cat"
            src="https://cataas.com/cat"
            alt="Random Cat"
        />
    </div>

    <div id="datetime" class="box"></div>

    <a
        id="apod-link"
        class="box"
        href="https://apod.nasa.gov/apod/astropix.html"
        target="_blank"
        rel="noopener noreferrer"
    >
        Wanna see a cool Astrophoto?
    </a>

    <script>
        function updateDateTime() {
            const now = new Date();

            const date = now.toLocaleDateString(undefined, {
                month: "long",
                day: "numeric"
            });

            const time = now.toLocaleTimeString(undefined, {
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit",
                hour12: false
            });

            document.getElementById("datetime").textContent =
                `${date} ${time}`;
        }

        updateDateTime();
        setInterval(updateDateTime, 1000);
    </script>
</body>
</html>
