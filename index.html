<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>New Tab</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

<style>
:root {
    --green: #22c55e;
}

* {
    box-sizing: border-box;
}

html,
body {
    margin: 0;
    width: 100%;
    height: 100%;
}

body {
    background: #000;
    color: var(--green);

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    font-family: "JetBrains Mono", monospace;
}

/* Cat frame */
#frame {
    border: 1px solid var(--green);
    border-radius: 18px;
    padding: 8px;

    background: #0a0a0a;

    width: min(900px, 75vw);

    box-shadow:
        0 0 8px rgba(34, 197, 94, 0.25),
        0 0 20px rgba(34, 197, 94, 0.10);
}

#cat {
    display: block;

    width: 100%;
    max-height: 65vh;

    object-fit: contain;

    border-radius: 12px;
}

/* Date and time */
#datetime {
    margin-top: 20px;

    font-size: 24px;
    letter-spacing: 0.5px;

    color: var(--green);
}

/* APOD link */
#apod-link {
    margin-top: 18px;

    color: var(--green);
    text-decoration: none;

    border: 1px solid var(--green);
    border-radius: 12px;

    padding: 10px 18px;

    transition:
        background 0.2s ease,
        transform 0.2s ease;
}

#apod-link:hover {
    background: rgba(34, 197, 94, 0.12);
    transform: translateY(-1px);
}
</style>
</head>
<body>

<div id="frame">
    <img
        id="cat"
        alt="Random Cat"
        src=""
    >
</div>

<div id="datetime"></div>

<a href="#" id="apod-link">
    Wanna see a cool astrophoto?
</a>

<script>
// Fresh random cat
document.getElementById("cat").src =
    "https://cataas.com/cat?ts=" + Date.now();


// Date + Time
function updateDateTime() {
    const now = new Date();

    const day = String(now.getDate()).padStart(2, "0");

    const month = now.toLocaleString("en-GB", {
        month: "long"
    });

    const time = now.toLocaleTimeString("en-GB", {
        hour12: false
    });

    document.getElementById("datetime").textContent =
        `${day} ${month} ${time}`;
}

updateDateTime();
setInterval(updateDateTime, 1000);


// Random APOD
document.getElementById("apod-link").addEventListener("click", function (e) {
    e.preventDefault();

    const start = new Date("2015-01-01");
    const end = new Date("2025-12-31");

    const randomDate = new Date(
        start.getTime() +
        Math.random() * (end.getTime() - start.getTime())
    );

    const yy = String(randomDate.getFullYear()).slice(-2);
    const mm = String(randomDate.getMonth() + 1).padStart(2, "0");
    const dd = String(randomDate.getDate()).padStart(2, "0");

    window.location.href =
        `https://apod.nasa.gov/apod/ap${yy}${mm}${dd}.html`;
});
</script>

</body>
</html>
