<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>New Tab</title>

<style>
:root {
    --green: #22c55e;
}

* {
    box-sizing: border-box;
}

html,
body {
    margin: 0;
    width: 100%;
    height: 100%;
}

body {
    background: #000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: system-ui, sans-serif;
    overflow: hidden;
}

/* Cat image frame */
#frame {
    border: 1px solid var(--green);
    border-radius: 18px;
    padding: 8px;
    background: #0a0a0a;

    width: min(900px, 75vw);
    max-height: 75vh;

    box-shadow:
        0 0 8px rgba(34, 197, 94, 0.25),
        0 0 20px rgba(34, 197, 94, 0.10);
}

#cat {
    display: block;
    width: 100%;
    max-height: calc(75vh - 16px);
    object-fit: contain;

    border-radius: 12px;
}

/* APOD link */
#apod-link {
    margin-top: 24px;

    color: var(--green);
    text-decoration: none;

    border: 1px solid var(--green);
    border-radius: 12px;

    padding: 10px 18px;

    transition:
        background 0.2s ease,
        transform 0.2s ease;
}

#apod-link:hover {
    background: rgba(34, 197, 94, 0.12);
    transform: translateY(-1px);
}
</style>
</head>
<body>

<div id="frame">
    <img
        id="cat"
        alt="Random Cat"
        src="https://cataas.com/cat?ts=0">
</div>

<a href="#" id="apod-link">
    Wanna see a cool astrophoto?
</a>

<script>
// Force a fresh cat image every time
document.getElementById("cat").src =
    "https://cataas.com/cat?ts=" + Date.now();

// Random APOD link
document.getElementById("apod-link").addEventListener("click", function (e) {
    e.preventDefault();

    const start = new Date("2015-01-01");
    const end = new Date("2025-12-31");

    const randomDate = new Date(
        start.getTime() +
        Math.random() * (end.getTime() - start.getTime())
    );

    const yy = String(randomDate.getFullYear()).slice(-2);
    const mm = String(randomDate.getMonth() + 1).padStart(2, "0");
    const dd = String(randomDate.getDate()).padStart(2, "0");

    window.location.href =
        `https://apod.nasa.gov/apod/ap${yy}${mm}${dd}.html`;
});
</script>

</body>
</html>
